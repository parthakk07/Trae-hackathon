<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Reality Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0B0F14;
      color: #E6EDF3;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1F2933;
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      background: #E6EDF3;
      border-radius: 4px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #11161C;
      border-radius: 6px;
      font-size: 12px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3FB950;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: #11161C;
      border: 1px solid #1F2933;
      border-radius: 6px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: #E6EDF3;
    }

    .stat-label {
      font-size: 11px;
      color: #6B7785;
      margin-top: 4px;
    }

    .current-site {
      background: #11161C;
      border: 1px solid #1F2933;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .site-title {
      font-size: 13px;
      font-weight: 500;
      color: #E6EDF3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .site-category {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1F2933;
      color: #9BA7B4;
    }

    .site-url {
      font-size: 11px;
      color: #6B7785;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timer {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      color: #9BA7B4;
      margin-top: 6px;
    }

    .action-btn {
      width: 100%;
      padding: 10px;
      background: #000;
      color: #fff;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .action-btn:hover {
      background: #1a1a1a;
    }

    .footer {
      padding-top: 12px;
      border-top: 1px solid #1F2933;
      text-align: center;
    }

    .reset-link {
      font-size: 11px;
      color: #6B7785;
      text-decoration: none;
      cursor: pointer;
    }

    .reset-link:hover {
      color: #9BA7B4;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #6B7785;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark"></div>
    <span class="title">Dev Reality</span>
  </div>

  <div class="status">
    <span class="status-dot"></span>
    <span>Tracking active</span>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="productive-time">0m</div>
      <div class="stat-label">Productive</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="unproductive-time">0m</div>
      <div class="stat-label">Distracted</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="neutral-time">0m</div>
      <div class="stat-label">Neutral</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="tab-switches">0</div>
      <div class="stat-label">Tab Switches</div>
    </div>
  </div>

  <div class="current-site">
    <div class="site-header">
      <span class="site-title" id="site-title">Loading...</span>
      <span class="site-category" id="site-category">-</span>
    </div>
    <div class="site-url" id="site-url">-</div>
    <div class="timer" id="timer">Time on site: 0:00</div>
  </div>

  <button class="action-btn" id="open-dashboard">Open Dashboard</button>

  <div class="footer">
    <a class="reset-link" id="reset-link">Reset Today's Stats</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
